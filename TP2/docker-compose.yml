---
services:
  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: tp2db
      POSTGRES_USER: tp2user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data

  api:
    build: ./api
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: tp2db
      DB_USER: tp2user
      DB_PASSWORD: ${DB_PASSWORD}
    restart: on-failure
    depends_on:
      - database

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - api

  adminer:
    image: adminer
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: database
    depends_on:
      - database

volumes:
  pg_data:
